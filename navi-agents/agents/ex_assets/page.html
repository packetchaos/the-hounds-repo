<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Asset Explorer · Navi Agents</title>
<link rel="stylesheet" href="/static/console.css"/>
<style>.plink{color:var(--accent);text-decoration:none;font-weight:600}.plink:hover{text-decoration:underline}
#tbl{table-layout:fixed;width:100%}#tbl th,#tbl td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}</style>
</head><body>
<div class="wrap">
  <header class="top" id="app-header"></header>
  <section class="card">
    <h2 style="margin:0">🔎 Asset Explorer</h2>
    <p class="sub" style="margin:2px 0 8px">Search navi.db assets by hostname, IP, OS or network. 500 rows/page. Click a host to open its <b>Argos deep-dive</b> — with a link out to the Tenable platform.</p>
    <div class="toolbar needs-llm"><input id="nlq" placeholder="Ask in plain English → SQL on the assets table…" style="flex:1;min-width:240px;padding:9px;border-radius:8px;border:1px solid var(--accent);background:var(--bg-2);color:var(--ink)"><button class="btn sm" id="nlgo">✨ Ask (NL→SQL)</button></div>
    <div id="nlout" class="needs-llm"></div>
    <div class="toolbar"><input id="q" placeholder="hostname / IP / OS / network…" style="flex:1;min-width:220px;padding:9px;border-radius:8px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink)"><button class="btn run sm" id="go">▶ Search</button><span class="chip" id="count"></span></div>
    <div id="flash" class="flash"></div>
    <table id="tbl" style="table-layout:fixed;width:100%"><colgroup><col><col style="width:130px"><col style="width:230px"><col style="width:52px"><col style="width:52px"><col style="width:78px"></colgroup><thead><tr><th>Host</th><th>IP</th><th>OS</th><th>ACR</th><th>AES</th><th>Platform</th></tr></thead><tbody><tr><td colspan="6" class="sub">Search to load…</td></tr></tbody></table>
    <div class="toolbar" id="pager"></div>
  </section>
  <footer>Asset Explorer · read-only navi.db search (paginated 500/page)</footer>
</div>
<script src="/static/console.js"></script>
<script>
const API=agentApi('ex_assets'); const PAGE=500;
async function go(off){ off=off||0;
  document.getElementById('go').disabled=true; flash('flash','<span class="spin"></span> querying navi.db…','run');
  let o; try{ o=await API.post('search',{q:document.getElementById('q').value.trim(),offset:off}); }catch(e){ o={ok:false,error:e.message}; }
  document.getElementById('go').disabled=false;
  if(!o.ok){ flash('flash','✗ '+(o.error||'failed'),'crit'); return; }
  flashClear('flash'); const res=o.result||{}; const rows=res.rows||[];
  document.getElementById('count').textContent=rows.length+' shown';
  document.querySelector('#tbl tbody').innerHTML=rows.length?rows.map(r=>`<tr><td title=\"${esc((r.hostname||'').trim())}\"><a class=\"plink\" href=\"/agents/argos/page.html?target=${encodeURIComponent(r.uuid)}\" title=\"Open the Argos asset deep-dive\">${esc((r.hostname||'').trim()||'(none)')}</a></td><td class=\"mono\">${esc(r.ip_address||'')}</td><td title=\"${esc(r.operating_system||'')}\">${esc(r.operating_system||'')}</td><td>${esc(String(r.acr||''))}</td><td>${esc(String(r.aes||''))}</td><td>${r.url?`<a class=\"plink\" href=\"${String(r.url).replace(/&/g,'&amp;').replace(/\"/g,'&quot;')}\" target=\"_blank\" rel=\"noopener\">Open ↗</a>`:'<span class=\"sub\">—</span>'}</td></tr>`).join(''):'<tr><td colspan="6" class="sub">No matches.</td></tr>';
  const pg=document.getElementById('pager'); const page=res.page||1;
  pg.innerHTML='<button class="btn ghost sm" '+(off<=0?'disabled':'')+' id="pp">◀ Prev</button><span class="chip">page '+page+' · rows '+(rows.length?off+1:0)+'–'+(off+rows.length)+'</span><button class="btn ghost sm" '+(res.has_next?'':'disabled')+' id="pn">Next ▶</button>';
  const pp=document.getElementById('pp'); if(pp)pp.onclick=()=>go(Math.max(0,off-PAGE));
  const pn=document.getElementById('pn'); if(pn)pn.onclick=()=>go(off+PAGE);
}
document.getElementById('go').onclick=()=>go(0);
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')go(0);});
mountAgentHeader({icon:'🔎',name:'Asset Explorer',sub:'navi.db search · 500/page'});
wireNlBox('assets');
</script>
</body></html>
